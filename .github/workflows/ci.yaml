  #       with:
  #         node-version: 22.x

  #     - run: yarn install --frozen-lockfile
  #     - run: yarn playwright install chromium
  #     - run: yarn test:e2e
  #     - uses: actions/upload-artifact@v7
  #       if: ${{ !cancelled() }}
  #       with:
  #         name: playwright-report-node${{ matrix.node_version }}
  #         path: |
  #           backstage/e2e-test-report/
  #           backstage/node_modules/.cache/e2e-test-results/
  #         retention-days: 3

  build-and-push-plugin-container-image:
    runs-on: ubuntu-latest
    needs: build-and-test
    if: github.event_name == 'push' && github.ref == 'refs/heads/main'

    steps:
      - name: Harden Runner
        uses: step-security/harden-runner@9af89fc71515a100421586dfdb3dc9c984fbf411 # v2.19.4
        with:
          egress-policy: audit

      - uses: actions/checkout@v6

      - name: Use Node.js 22.x
        uses: actions/setup-node@v6
        with:
          node-version: 22.x

      - run: yarn install --frozen-lockfile
      - run: yarn tsc:full
      - run: yarn build:all

      - name: Install podman
        run: |
          sudo apt-get update
          sudo apt-get -y install podman

      - run: npx -y @red-hat-developer-hub/cli@1.10.x plugin package --tag rhdh-demo-plugins:latest

      - name: Push to GitHub Container Registry
        run: |
          echo ${{ github.token }} | podman login ghcr.io -u ${{ github.actor }} --password-stdin
          podman push rhdh-demo-plugins:latest ghcr.io/${{ github.repository_owner }}/rhdh-demo-plugins:latest

  build-and-push-plugin-container-images:
    runs-on: ubuntu-latest
    needs: build-and-test
    if: github.event_name == 'push' && github.ref == 'refs/heads/main'

    strategy:
      matrix:
        plugin:
          - todo
          - todo-backend
      fail-fast: false

    steps:
      - name: Harden Runner
        uses: step-security/harden-runner@9af89fc71515a100421586dfdb3dc9c984fbf411 # v2.19.4
        with:
          egress-policy: audit

      - uses: actions/checkout@v6

      - name: Use Node.js 22.x
        uses: actions/setup-node@v6
        with:
          node-version: 22.x

      - run: yarn install --frozen-lockfile
      - run: yarn tsc:full
      - run: yarn build:all

      - name: Install podman
        run: |
          sudo apt-get update
          sudo apt-get -y install podman

      - run: npx -y @red-hat-developer-hub/cli@1.10.x plugin package --tag rhdh-${{ matrix.plugin }}-demo-plugin:latest
        working-directory: plugins/${{ matrix.plugin }}

      - name: Push to GitHub Container Registry
        run: |
          echo ${{ github.token }} | podman login ghcr.io -u ${{ github.actor }} --password-stdin
          podman push rhdh-${{ matrix.plugin }}-demo-plugin:latest ghcr.io/${{ github.repository_owner }}/rhdh-${{ matrix.plugin }}-demo-plugin:latest
